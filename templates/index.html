<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Used Car Price Predictor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0a; min-height: 100vh; color: white; }
    .hero { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%); padding: 30px 20px 60px; text-align: center; position: relative; overflow: hidden; border-bottom: 2px solid #e63946; }
    .hero::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(230,57,70,0.08) 0%, transparent 60%); }
    .hero-badge { display: inline-block; background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.4); color: #e63946; padding: 6px 18px; border-radius: 20px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
    .hero h1 { font-size: 42px; font-weight: 800; background: linear-gradient(90deg, #ffffff, #e63946); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; line-height: 1.2; }
    .hero p { color: #888; font-size: 16px; }
    .car-icon { font-size: 60px; margin-bottom: 16px; display: block; }
    .container { max-width: 900px; margin: -30px auto 40px; padding: 0 20px; position: relative; z-index: 10; }
    .card { background: #111111; border: 1px solid #222; border-radius: 20px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
    .card-header { background: linear-gradient(90deg, #e63946, #c1121f); padding: 18px 28px; display: flex; align-items: center; gap: 12px; }
    .card-header span { font-size: 18px; font-weight: 700; color: white; letter-spacing: 0.5px; }
    .card-header .dots { margin-left: auto; display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.3); }
    .card-body { padding: 32px 28px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 20px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #888; }
    .field input, .field select { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 14px 16px; color: white; font-size: 15px; transition: all 0.2s; appearance: none; -webkit-appearance: none; }
    .field input::placeholder { color: #444; }
    .field input:focus, .field select:focus { outline: none; border-color: #e63946; background: #1f1f1f; box-shadow: 0 0 0 3px rgba(230,57,70,0.1); }
    .field select option { background: #1a1a1a; }
    .divider { display: flex; align-items: center; gap: 16px; margin: 28px 0; }
    .divider-line { flex: 1; height: 1px; background: #222; }
    .divider-text { color: #444; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
    .btn-predict { width: 100%; padding: 18px; background: linear-gradient(90deg, #e63946, #c1121f); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; margin-top: 28px; transition: all 0.3s; }
    .btn-predict:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(230,57,70,0.4); }
    .btn-predict:active { transform: translateY(0); }
    #result { display: none; margin-top: 28px; background: linear-gradient(135deg, #0d1f0d, #1a2e1a); border: 1px solid #2d5a2d; border-radius: 16px; padding: 28px; text-align: center; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
    .result-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #4caf50; margin-bottom: 8px; }
    .result-price { font-size: 48px; font-weight: 800; color: #4caf50; line-height: 1; margin-bottom: 8px; }
    .result-sub { color: #555; font-size: 13px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: #1a1a1a; border-top: 1px solid #222; }
    .stat { padding: 20px; text-align: center; background: #111; }
    .stat-number { font-size: 24px; font-weight: 800; color: #e63946; }
    .stat-label { font-size: 11px; color: #555; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
    @media (max-width: 600px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } .hero h1 { font-size: 28px; } .result-price { font-size: 36px; } }
  </style>
</head>
<body>

  <div class="hero">
    <span class="car-icon">🏎️</span>
    <div class="hero-badge">AI Powered</div>
    <h1>Used Car Price Predictor</h1>
    <p>Get an instant AI-powered valuation for any used car in India</p>
  </div>

  <div class="container">
    <div class="card">

      <div class="stats">
        <div class="stat"><div class="stat-number">9,500+</div><div class="stat-label">Cars Trained</div></div>
        <div class="stat"><div class="stat-number">38</div><div class="stat-label">Brands</div></div>
        <div class="stat"><div class="stat-number">95%</div><div class="stat-label">Accuracy</div></div>
      </div>

      <div class="card-header">
        <span>🔍 Enter Car Details</span>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>

      <div class="card-body">

        <div class="grid-2">
          <div class="field">
            <label>Brand</label>
            <select id="brand" onchange="updateModels()">
              <option value="">-- Select Brand --</option>
              {% for b in brands %}
              <option value="{{ b }}">{{ b }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="field">
            <label>Model</label>
            <select id="car_model">
              <option value="">-- Select Brand First --</option>
            </select>
          </div>
        </div>

        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-text">Car Details</div>
          <div class="divider-line"></div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label>Car Age (Years)</label>
            <input type="number" id="age" placeholder="e.g. 5" min="1" max="30">
          </div>
          <div class="field">
            <label>Kilometres Driven</label>
            <input type="number" id="km_driven" placeholder="e.g. 45000">
          </div>
        </div>

        <div class="grid-3">
          <div class="field">
            <label>Transmission</label>
            <select id="transmission">
              <option value="1">Manual</option>
              <option value="0">Automatic</option>
            </select>
          </div>
          <div class="field">
            <label>Owner</label>
            <select id="owner">
              <option value="0">1st Owner</option>
              <option value="1">2nd Owner</option>
            </select>
          </div>
          <div class="field">
            <label>Fuel Type</label>
            <select id="fuel_type">
              <option value="0">Diesel</option>
              <option value="1">Petrol</option>
              <option value="2">CNG</option>
            </select>
          </div>
        </div>

        <button class="btn-predict" onclick="predict()">⚡ Predict Price Now</button>

        <div id="result">
          <div class="result-label">✅ Estimated Market Price</div>
          <div class="result-price" id="price-value">—</div>
          <div class="result-sub">Based on current market data and ML analysis</div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // Brand to Model mapping
    const brandModelMap = {
      {% for brand, models in brand_model_map.items() %}
      {{ brand | tojson }}: {{ models | tojson }},
      {% endfor %}
    };

    function updateModels() {
      const brand = document.getElementById('brand').value;
      const modelSelect = document.getElementById('car_model');
      modelSelect.innerHTML = '<option value="">-- Select Model --</option>';
      if (brand && brandModelMap[brand]) {
        brandModelMap[brand].forEach(function(m) {
          const opt = document.createElement('option');
          opt.value = m;
          opt.textContent = m;
          modelSelect.appendChild(opt);
        });
      }
    }

    async function predict() {
      const brand        = document.getElementById('brand').value;
      const car_model    = document.getElementById('car_model').value;
      const age          = parseInt(document.getElementById('age').value);
      const km_driven    = parseFloat(document.getElementById('km_driven').value);
      const transmission = parseInt(document.getElementById('transmission').value);
      const owner        = parseInt(document.getElementById('owner').value);
      const fuel_type    = parseInt(document.getElementById('fuel_type').value);

      if (!brand || !car_model || !age || !km_driven) {
        alert('Please fill in all fields!');
        return;
      }

      const btn = document.querySelector('.btn-predict');
      btn.textContent = '⏳ Analysing...';
      btn.disabled = true;

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ brand, car_model, age, km_driven, transmission, owner, fuel_type })
        });
        const result = await res.json();
        const formatted = '₹ ' + result.predicted_price.toLocaleString('en-IN');
        document.getElementById('price-value').textContent = formatted;
        document.getElementById('result').style.display = 'block';
      } catch(e) {
        alert('Something went wrong. Please try again!');
      }

      btn.textContent = '⚡ Predict Price Now';
      btn.disabled = false;
    }
  </script>

</body>
</html>
